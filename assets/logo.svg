<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Dr Somani's Homoeopathy logo">
  <defs>
    <radialGradient id="petal" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ff6a5e"/>
      <stop offset="55%" stop-color="#e83b34"/>
      <stop offset="100%" stop-color="#c41f1f"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe98a"/>
      <stop offset="70%" stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#d99a1f"/>
    </radialGradient>
    <linearGradient id="hand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec64a"/>
      <stop offset="100%" stop-color="#3f9e2c"/>
    </linearGradient>
    <g id="pet"><ellipse cx="100" cy="60" rx="8.5" ry="25" fill="url(#petal)"/></g>
  </defs>

  <!-- green cupping hands -->
  <path d="M100 168 C 66 158 46 124 56 92 C 78 114 94 138 100 168 Z" fill="url(#hand)"/>
  <path d="M100 168 C 134 158 154 124 144 92 C 122 114 106 138 100 168 Z" fill="url(#hand)"/>

  <!-- gerbera petals (two layered rings) -->
  <g>
    <use href="#pet" transform="rotate(0 100 100)"/>
    <use href="#pet" transform="rotate(20 100 100)"/>
    <use href="#pet" transform="rotate(40 100 100)"/>
    <use href="#pet" transform="rotate(60 100 100)"/>
    <use href="#pet" transform="rotate(80 100 100)"/>
    <use href="#pet" transform="rotate(100 100 100)"/>
    <use href="#pet" transform="rotate(120 100 100)"/>
    <use href="#pet" transform="rotate(140 100 100)"/>
    <use href="#pet" transform="rotate(160 100 100)"/>
    <use href="#pet" transform="rotate(180 100 100)"/>
    <use href="#pet" transform="rotate(200 100 100)"/>
    <use href="#pet" transform="rotate(220 100 100)"/>
    <use href="#pet" transform="rotate(240 100 100)"/>
    <use href="#pet" transform="rotate(260 100 100)"/>
    <use href="#pet" transform="rotate(280 100 100)"/>
    <use href="#pet" transform="rotate(300 100 100)"/>
    <use href="#pet" transform="rotate(320 100 100)"/>
    <use href="#pet" transform="rotate(340 100 100)"/>
  </g>
  <g opacity="0.95">
    <use href="#pet" transform="rotate(10 100 100) scale(1)" />
    <use href="#pet" transform="rotate(30 100 100)"/>
    <use href="#pet" transform="rotate(50 100 100)"/>
    <use href="#pet" transform="rotate(70 100 100)"/>
    <use href="#pet" transform="rotate(90 100 100)"/>
    <use href="#pet" transform="rotate(110 100 100)"/>
    <use href="#pet" transform="rotate(130 100 100)"/>
    <use href="#pet" transform="rotate(150 100 100)"/>
    <use href="#pet" transform="rotate(170 100 100)"/>
    <use href="#pet" transform="rotate(190 100 100)"/>
    <use href="#pet" transform="rotate(210 100 100)"/>
    <use href="#pet" transform="rotate(230 100 100)"/>
    <use href="#pet" transform="rotate(250 100 100)"/>
    <use href="#pet" transform="rotate(270 100 100)"/>
    <use href="#pet" transform="rotate(290 100 100)"/>
    <use href="#pet" transform="rotate(310 100 100)"/>
    <use href="#pet" transform="rotate(330 100 100)"/>
    <use href="#pet" transform="rotate(350 100 100)"/>
  </g>

  <!-- flower core -->
  <circle cx="100" cy="100" r="19" fill="url(#core)"/>
  <circle cx="100" cy="100" r="19" fill="none" stroke="#c41f1f" stroke-opacity="0.35" stroke-width="1.5"/>
</svg>
